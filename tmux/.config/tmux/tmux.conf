# our-nvim tmux configuration
# Works well with Neovim + R.nvim, iPad/Termius friendly

# ── General ──────────────────────────────────────────────────────────────────

# Keep default Ctrl-b prefix (consistent across servers, works in Termius)

# Enable mouse support (essential for iPad/touch)
set -g mouse on

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Increase scrollback
set -g history-limit 50000

# Reduce escape delay (important for Neovim)
set -sg escape-time 10

# Enable focus events (for Neovim autoread)
set -g focus-events on

# True color support
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm*:Tc"

# ── Key bindings ─────────────────────────────────────────────────────────────

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Split panes with | and - (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with Alt+arrow (no prefix needed, iPad friendly)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Also support Ctrl+hjkl for pane navigation (vim style, with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Switch windows with Shift+arrow (no prefix needed)
bind -n S-Left previous-window
bind -n S-Right next-window

# ── Status bar ───────────────────────────────────────────────────────────────

set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 30
set -g status-right-length 60
set -g status-left "#[fg=#89b4fa,bold] #S "
set -g status-right "#[fg=#a6adc8] #H | %H:%M "
setw -g window-status-current-format "#[fg=#f5c2e7,bold] #I:#W "
setw -g window-status-format "#[fg=#6c7086] #I:#W "

# ── Copy mode (vi style) ────────────────────────────────────────────────────

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Pane borders ─────────────────────────────────────────────────────────────

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
